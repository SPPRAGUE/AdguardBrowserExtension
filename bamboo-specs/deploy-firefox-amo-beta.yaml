---
version: 2
deployment:
  name: browser extension - deploy firefox amo beta
  source-plan: ADGEXT-BEFIREFOXAMOBETASPECS
release-naming: ${bamboo.inject.version}-beta
environments:
  - Addons Mozilla

Addons Mozilla:
  triggers: []
  tasks:
    - clean
    - checkout:
        repository: bamboo-deploy-publisher
        path: bamboo-deploy-publisher
        force-clean-build: true
    - artifact-download:
        artifacts:
          - name: build.txt
          - name: firefox-amo.zip
          - name: source.zip
          - name: approval-notes.txt
    - script:
        interpreter: SHELL
        scripts:
          - |-
            set -x
            set -e

            # Fix mixed logs
            exec 2>&1

            ls -la

            ./bamboo-deploy-publisher/deploy.sh browser-extension-amo-beta
  final-tasks: []
  variables: {}
  requirements:
    - extension: 'true'
